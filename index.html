<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Suika Combo King - Ultra Clear</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Fredoka One', cursive; }
        #viewport { position: relative; width: 100%; height: 100%; max-width: 400px; max-height: 800px; background: #81d4fa; overflow: hidden; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #glass-container { position: relative; width: 85%; height: 72%; background: rgba(255, 255, 255, 0.2); border: 3px solid rgba(255, 255, 255, 0.4); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin: 18% auto 0; z-index: 2; }
        
        #score-board { 
            position: absolute; top: 20px; left: 20px; 
            font-size: 32px; color: #fff; z-index: 10; 
            text-shadow: 3px 3px 0px #0277bd; 
            background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 50px; 
        }
        
        #next-box { position: absolute; top: 20px; right: 20px; background: #fff; padding: 8px; border-radius: 15px; text-align: center; z-index: 10; border: 2px solid #0277bd; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; }
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; }
        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 25px; text-align: center; z-index: 100; width: 220px; }
        button { background: #ff7043; border: none; padding: 15px; color: white; border-radius: 12px; cursor: pointer; font-family: 'Fredoka One'; width: 100%; font-size: 20px; box-shadow: 0 5px 0 #b33939; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="score-board">0</div>
    <div id="next-box"><div id="next-emoji" style="font-size: 30px;">🍒</div></div>
    <div id="glass-container"></div>
    <div id="touch-layer"></div>
    <div id="game-over">
        <h2 style="margin:0; color:#f44336">Oyun Bitti!</h2>
        <p id="final-score" style="font-weight:bold; margin:15px 0;"></p>
        <button onclick="location.reload()">RESTART</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const glass = document.getElementById('glass-container');
    const cw = glass.clientWidth;
    const ch = glass.clientHeight;

    const render = Render.create({
        element: glass, engine: engine,
        options: { width: cw, height: ch, wireframes: false, background: 'transparent', pixelRatio: 1 }
    });

    const ground = Bodies.rectangle(cw/2, ch+15, cw, 40, { isStatic: true });
    const leftWall = Bodies.rectangle(-15, ch/2, 30, ch, { isStatic: true });
    const rightWall = Bodies.rectangle(cw+15, ch/2, 30, ch, { isStatic: true });
    const deadLine = ch * 0.15;
    Composite.add(engine.world, [ground, leftWall, rightWall]);

    const FRUITS = [
        { r: cw*0.06, color: '#ff8a80', emoji: '🍒', baseScore: 10 },
        { r: cw*0.09, color: '#ba68c8', emoji: '🍓', baseScore: 25 },
        { r: cw*0.13, color: '#81c784', emoji: '🍇', baseScore: 50 },
        { r: cw*0.17, color: '#fff176', emoji: '🍊', baseScore: 100 },
        { r: cw*0.22, color: '#ffb74d', emoji: '🍎', baseScore: 250 },
        { r: cw*0.28, color: '#e57373', emoji: '🍐', baseScore: 500 },
        { r: cw*0.35, color: '#64b5f6', emoji: '🍍', baseScore: 1000 },
        { r: cw*0.42, color: '#2ecc71', emoji: '🍉', baseScore: 2500 }
    ];

    let particles = [];
    let floatingTexts = [];
    let score = 0, nextLevel = 0, isGameOver = false, canSpawn = true;
    let comboCount = 0, lastMergeTime = 0;

    function createFruit(x, y, level) {
        return Bodies.circle(x, y, FRUITS[level].r, {
            label: 'f_'+level, restitution: 0.2,
            plugin: { level: level, born: Date.now() },
            render: { fillStyle: FRUITS[level].color }
        });
    }

    // ULTRA BELİRGİN COMBO YAZISI
    function spawnText(x, y, count) {
        let txt = "GOOD!";
        let color = "#fff"; // Beyaz
        if (count > 1) { txt = "GREAT!"; color = "#ffeb3b"; } // Parlak Sarı
        if (count > 2) { txt = "AWESOME!"; color = "#ff9800"; } // Parlak Turuncu
        if (count > 3) { txt = "UNBELIEVABLE!"; color = "#f44336"; } // Parlak Kırmızı
        if (count > 4) { txt = "LEGENDARY!"; color = "#e91e63"; } // Parlak Pembe

        floatingTexts.push({
            x: x, y: y, text: txt, color: color,
            life: 1.0,
            vy: -2
        });
    }

    function triggerVibe(ms) { if ("vibrate" in navigator) navigator.vibrate(ms); }

    document.getElementById('touch-layer').addEventListener('pointerdown', (e) => {
        if (isGameOver || !canSpawn) return;
        const rect = glass.getBoundingClientRect();
        let x = e.clientX - rect.left;
        const limit = FRUITS[nextLevel].r + 10;
        x = Math.max(limit, Math.min(x, cw - limit));
        Composite.add(engine.world, createFruit(x, deadLine - 20, nextLevel));
        nextLevel = Math.floor(Math.random() * 3);
        document.getElementById('next-emoji').innerText = FRUITS[nextLevel].emoji;
        canSpawn = false;
        setTimeout(() => canSpawn = true, 500);
    });

    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            const { bodyA, bodyB } = pair;
            if (bodyA.label === bodyB.label && bodyA.label.startsWith('f_')) {
                const lvl = bodyA.plugin.level;
                if (lvl < FRUITS.length - 1) {
                    const nx = (bodyA.position.x + bodyB.position.x) / 2;
                    const ny = (bodyA.position.y + bodyB.position.y) / 2;
                    
                    const now = Date.now();
                    if (now - lastMergeTime < 1000) { comboCount++; } else { comboCount = 1; }
                    lastMergeTime = now;

                    spawnText(nx, ny, comboCount);
                    triggerVibe(40 + (comboCount * 5));
                    
                    Composite.remove(engine.world, [bodyA, bodyB]);
                    Composite.add(engine.world, createFruit(nx, ny, lvl + 1));
                    
                    score += (FRUITS[lvl].baseScore * comboCount);
                    document.getElementById('score-board').innerText = score;
                }
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        const bodies = Composite.allBodies(engine.world);
        const now = Date.now();

        // Uçan Yazıları Çiz (Belirginleştirildi)
        floatingTexts = floatingTexts.filter(t => t.life > 0);
        floatingTexts.forEach(t => {
            ctx.save();
            ctx.globalAlpha = t.life;
            
            // 1. Siyah Kontür (stroke) - Yazıyı arkadan ayırır
            ctx.strokeStyle = "black";
            ctx.lineWidth = 6; // Kalın kontür
            ctx.font = `bold ${24 + (t.life * 12)}px Fredoka One`; // Biraz daha büyük başlangıç
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 2. Kontürün altına hafif gölge (shadowBlur) - Derinlik katar
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            // Önce siyah çerçeveyi çiz
            ctx.strokeText(t.text, t.x, t.y);
            
            // 3. Renkli İç Yazı - Çerçevenin üzerine çizilir
            ctx.fillStyle = t.color;
            ctx.fillText(t.text, t.x, t.y);
            
            t.y += t.vy;
            t.life -= 0.015; // Biraz daha yavaş kaybolsun
            ctx.restore();
        });

        // Meyveleri Çiz
        bodies.forEach(body => {
            if (body.label.startsWith('f_')) {
                const lvl = body.plugin.level;
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                ctx.font = `${FRUITS[lvl].r * 1.6}px Arial`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(FRUITS[lvl].emoji, 0, 4);
                ctx.restore();

                if (!isGameOver && body.position.y < deadLine && now - body.plugin.born > 2500 && Math.abs(body.velocity.y) < 0.1) {
                    isGameOver = true;
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-score').innerText = "SCORE: " + score;
                }
            }
        });
    });

    Render.run(render);
    Runner.run(Runner.create({ isFixed: true }), engine);
</script>
</body>
</html>

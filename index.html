<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lock Master: Fix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #fff; font-family: 'Inter', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 50; }
        #remaining { font-size: 130px; font-weight: 900; color: #000; opacity: 0.08; transition: transform 0.15s; }
        #top-bar { position: absolute; top: 8%; width: 100%; text-align: center; }
        #best-container { position: absolute; bottom: 8%; text-align: center; }
        .label { font-size: 10px; letter-spacing: 4px; color: #000; opacity: 0.4; text-transform: uppercase; }
        .val { font-size: 18px; font-weight: 900; color: #000; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; }
        h1 { font-weight: 300; font-size: 45px; letter-spacing: 12px; margin-bottom: 40px; color: #000; }
        button { background: #000; border: none; color: #fff; padding: 20px 60px; border-radius: 100px; font-weight: 900; letter-spacing: 2px; font-size: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div id="top-bar"><div class="label">STAGE</div><div id="ui-lvl" class="val">01</div></div>
    <div id="remaining">1</div>
    <div id="best-container"><div class="label">PERSONAL BEST</div><div id="ui-best" class="val">01</div></div>
</div>

<div id="menu" class="overlay">
    <h1 id="title">LOCK</h1>
    <button id="startBtn">ENGAGE</button>
</div>

<script>
const game = {
    level: 1, best: 1, clicks: 1, angle: 0, dir: 1,
    target: { a: 0, w: 0.6 }, particles: [], state: 'MENU', pulse: 0, audioCtx: null,
    themes: [
        { bg: '#ffffff', acc: '#FFD700' }, { bg: '#f0faff', acc: '#007AFF' },
        { bg: '#fff0f0', acc: '#FF3B30' }, { bg: '#f0fff0', acc: '#34C759' },
        { bg: '#f5f0ff', acc: '#5856D6' }
    ],

    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.onresize = () => this.resize();
        this.level = parseInt(localStorage.getItem('kilit_lvl')) || 1;
        this.best = parseInt(localStorage.getItem('kilit_best')) || 1;
        this.updateUI();
        
        // Buton tıklama olayını buraya aldım (Daha güvenli)
        document.getElementById('startBtn').addEventListener('click', () => this.start());
        document.getElementById('startBtn').addEventListener('touchstart', (e) => { e.preventDefault(); this.start(); });

        this.loop();
    },

    resize() {
        this.width = this.canvas.width = window.innerWidth;
        this.height = this.canvas.height = window.innerHeight;
        this.radius = Math.min(this.width, this.height) * 0.35;
    },

    beep(freq, duration) {
        if(!this.audioCtx) return;
        try {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.connect(gain); gain.connect(this.audioCtx.destination);
            osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
            osc.start(); osc.stop(this.audioCtx.currentTime + duration);
        } catch(e) {}
    },

    start() {
        // Ses motorunu ilk dokunuşta canlandır (Kritik nokta)
        if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
        }

        this.clicks = this.level;
        this.state = 'PLAY';
        document.getElementById('menu').style.display = 'none';
        this.setTarget();
        this.updateUI();
    },

    setTarget() {
        const gap = 1.6 + Math.random() * 2.4;
        this.target.a = (this.angle + (this.dir * gap)) % 6.28;
        this.target.w = Math.max(0.25, 0.6 - (this.level * 0.005));
    },

    updateUI() {
        document.getElementById('ui-lvl').innerText = (this.level < 10 ? "0"+this.level : this.level);
        document.getElementById('ui-best').innerText = (this.best < 10 ? "0"+this.best : this.best);
        document.getElementById('remaining').innerText = this.clicks;
        const theme = this.themes[(this.level - 1) % this.themes.length];
        document.body.style.backgroundColor = theme.bg;
    },

    check() {
        if(this.state !== 'PLAY') return;
        const nA = (this.angle % 6.28 + 6.28) % 6.28;
        let s = (this.target.a % 6.28 + 6.28) % 6.28;
        let e = (s + this.target.w) % 6.28;
        let hit = (s < e) ? (nA >= s && nA <= e) : (nA >= s || nA <= e);

        if(hit) {
            this.beep(440, 0.1);
            if(navigator.vibrate) navigator.vibrate(15);
            this.spawnParticles();
            this.pulse = 10;
            this.clicks--;
            if(this.clicks <= 0) {
                this.level++;
                this.clicks = this.level;
                if(this.level > this.best) {
                    this.best = this.level;
                    localStorage.setItem('kilit_best', this.best);
                }
                localStorage.setItem('kilit_lvl', this.level);
                if(navigator.vibrate) navigator.vibrate([30, 30, 30]);
            }
            this.dir *= -1;
            this.setTarget();
            this.updateUI();
        } else {
            this.beep(150, 0.3);
            if(navigator.vibrate) navigator.vibrate(100);
            this.state = 'MENU';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('title').innerText = "FAILED";
        }
    },

    spawnParticles() {
        const px = (this.width/2) + Math.cos(this.angle) * this.radius;
        const py = (this.height/2) + Math.sin(this.angle) * this.radius;
        const theme = this.themes[(this.level - 1) % this.themes.length];
        for(let i=0; i<8; i++) {
            this.particles.push({ x: px, y: py, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, l: 1.0, c: theme.acc });
        }
    },

    loop() {
        const cx = this.width / 2, cy = this.height / 2;
        const theme = this.themes[(this.level - 1) % this.themes.length];
        this.ctx.clearRect(0, 0, this.width, this.height);
        let curR = this.radius + (this.pulse * 0.5);
        if(this.pulse > 0) this.pulse -= 1;

        this.ctx.beginPath();
        this.ctx.arc(cx, cy, curR, 0, 6.28);
        this.ctx.strokeStyle = 'rgba(0,0,0,0.05)';
        this.ctx.lineWidth = 3;
        this.ctx.stroke();

        this.ctx.beginPath();
        this.ctx.arc(cx, cy, curR, this.target.a, this.target.a + this.target.w);
        this.ctx.strokeStyle = theme.acc;
        this.ctx.lineWidth = 7;
        this.ctx.lineCap = 'round';
        this.ctx.stroke();

        this.particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.l -= 0.04;
            this.ctx.fillStyle = p.c; this.ctx.globalAlpha = p.l;
            this.ctx.fillRect(p.x, p.y, 2, 2);
            if(p.l <= 0) this.particles.splice(i, 1);
        });
        this.ctx.globalAlpha = 1;

        if(this.state === 'PLAY') this.angle += (0.035 + (this.level * 0.0002)) * this.dir;
        const dotX = cx + Math.cos(this.angle) * curR, dotY = cy + Math.sin(this.angle) * curR;
        this.ctx.beginPath();
        this.ctx.arc(dotX, dotY, 5, 0, 6.28);
        this.ctx.fillStyle = '#000'; this.ctx.fill();

        requestAnimationFrame(() => this.loop());
    }
};

window.onload = () => game.init();
window.addEventListener('touchstart', (e) => { if(game.state === 'PLAY') { e.preventDefault(); game.check(); } }, {passive:false});
window.addEventListener('mousedown', (e) => { if(game.state === 'PLAY') game.check(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kilit Kırıcı - Level Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #121212; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Arial Black', sans-serif;
            transition: background 0.5s;
        }

        #p-cont, #t-cont, #combo-fill, .word-float { will-change: transform; }

        @keyframes rainbow {
            0% { background-color: #1e3799; }
            25% { background-color: #b71540; }
            50% { background-color: #079992; }
            75% { background-color: #fa983a; }
            100% { background-color: #1e3799; }
        }
        .rainbow-active { animation: rainbow 10s infinite linear; }
        .neon-aura { box-shadow: 0 0 40px #fff; border-color: rgba(255,255,255,0.9) !important; }

        .word-float { 
            position: fixed; font-size: 2.5rem; font-weight: 900; color: #fff; 
            text-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; z-index: 1001; 
            animation: wordPop 0.6s forwards; left: 50%; transform: translateX(-50%);
        }
        @keyframes wordPop { 
            0% { transform: translate(-50%, 0) scale(0); opacity: 0; } 
            50% { transform: translate(-50%, -20px) scale(1.2); opacity: 1; } 
            100% { transform: translate(-50%, -60px) scale(1); opacity: 0; } 
        }

        #game-box { position: relative; width: 260px; height: 260px; display: none; z-index: 10; }
        .track { position: absolute; inset: 0; border: 22px solid rgba(255,255,255,0.12); border-radius: 50%; transition: 0.3s; }
        .rotator { position: absolute; inset: 0; pointer-events: none; display: flex; justify-content: center; }
        .block { position: absolute; width: 55px; height: 22px; background: #fff; border-radius: 4px; box-shadow: 0 0 15px #fff; top: 0; }
        #player-dot { position: absolute; width: 55px; height: 22px; display: flex; align-items: center; justify-content: center; top: 0; font-size: 1.8rem; }

        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        .btn { padding: 16px 30px; font-size: 1.1rem; border: none; border-radius: 50px; margin: 6px; width: 80%; max-width: 280px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn:active { transform: scale(0.95); }
        .m-display { color: #f1c40f; font-weight: bold; font-size: 1.2rem; border: 2px solid #f1c40f; padding: 8px 25px; border-radius: 50px; margin-bottom: 15px; }

        .list-container { 
            width: 90%; max-width: 350px; max-height: 50vh; overflow-y: auto; 
            background: #1a1a1a; border-radius: 15px; padding: 10px; border: 1px solid #333;
        }
        .list-item { 
            background: #252525; margin: 5px 0; padding: 12px 15px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            border: 1px solid transparent;
        }
        .list-item.active { border-color: #f1c40f; background: #333; }

        #ui-header { position: absolute; top: 40px; text-align: center; display: none; width: 100%; z-index: 100; color: white; pointer-events: none; }
        #combo-bar { width: 120px; height: 6px; background: rgba(255,255,255,0.1); margin: 8px auto; border-radius: 3px; overflow: hidden; }
        #combo-fill { height: 100%; width: 100%; background: #f1c40f; transform: scaleX(0); transform-origin: left; }
        #level-display { color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="touch-layer" style="position:fixed; inset:0; z-index:50; display:none;"></div>

    <div id="menu" class="panel" style="display: flex;">
        <h1 style="color:#f1c40f; font-size: 2.2rem; margin-bottom: 10px;">KİLİT KIR</h1>
        <div class="m-display">💰 <span class="m-val">0</span></div>
        <button class="btn" style="background:#f1c40f;" onclick="start()">OYNA</button>
        <button class="btn" style="background:#3498db; color:white;" onclick="openMarket()">MARKET</button>
        <button class="btn" style="background:#9b59b6; color:white;" onclick="openInventory()">ÇANTA</button>
    </div>

    <div id="ui-header">
        <div id="level-display">BÖLÜM 1</div>
        <div style="color:#f1c40f; font-size: 0.9rem;">💰 <span class="m-val">0</span></div>
        <div id="hits" style="font-size: 5rem; font-weight: 900; margin: 2px 0;">3</div>
        <div id="combo-bar"><div id="combo-fill"></div></div>
        <div id="combo-count" style="color:#f1c40f; font-size: 0.9rem;">COMBO x0</div>
    </div>

    <div id="game-box">
        <div id="ring-track" class="track"></div>
        <div id="t-cont" class="rotator"><div class="block"></div></div>
        <div id="p-cont" class="rotator"><div id="player-dot">🟡</div></div>
    </div>

    <div id="death" class="panel">
        <h1 style="color:#ff4757; font-size: 3.5rem; margin-bottom: 20px;">BOOM!</h1>
        <div id="final-lvl" style="margin-bottom: 15px;">Bölüm: 1</div>
        <button class="btn" style="background:#f1c40f;" onclick="start()">TEKRAR DENE</button>
        <button class="btn" style="background:#333; color:white;" onclick="location.reload()">MENÜ</button>
    </div>

    <div id="market-panel" class="panel">
        <h2 style="color:#3498db; margin-top: 0;">MARKET</h2>
        <div class="list-container" id="market-list"></div>
        <button class="btn" style="margin-top: 15px; background:#333;" onclick="closePanels()">GERİ</button>
    </div>

    <div id="inv-panel" class="panel">
        <h2 style="color:#9b59b6; margin-top: 0;">ÇANTAM</h2>
        <div class="list-container" id="inv-list"></div>
        <button class="btn" style="margin-top: 15px; background:#333;" onclick="closePanels()">GERİ</button>
    </div>

    <script>
        const track = document.getElementById('ring-track');
        const comboFill = document.getElementById('combo-fill');
        const pCont = document.getElementById('p-cont');
        const tCont = document.getElementById('t-cont');
        const hitsEl = document.getElementById('hits');
        const comboEl = document.getElementById('combo-count');
        const levelEl = document.getElementById('level-display');

        let money = parseInt(localStorage.getItem('lockMoney')) || 0;
        let owned = JSON.parse(localStorage.getItem('lockOwned')) || ['🟡'];
        let active = localStorage.getItem('lockActive') || '🟡';
        
        const skins = [{i:'🟡',p:0}, {i:'🟢',p:250}, {i:'🔵',p:500}, {i:'🟣',p:1000}, {i:'👻',p:2500}, {i:'🚀',p:15000}, {i:'💎',p:75000}, {i:'👑',p:100000}];
        const bgColors = ["#121212", "#1e3799", "#b71540", "#079992", "#fa983a"];
        const words = ["GREAT!", "PERFECT!", "AMAZING!", "GODLIKE!", "UNBELIEVABLE!"];

        let isPlaying = false, angle = 0, dir = 1, speed = 2.4, level = 1, hits = 3;
        let targetAngle = 0, targetDir = 1, targetSpeed = 0.6, combo = 0, comboT = 0;
        const COMBO_MAX = 2400;

        function updateM() {
            document.querySelectorAll('.m-val').forEach(e => e.innerText = money.toLocaleString());
            document.getElementById('player-dot').innerText = active;
            localStorage.setItem('lockMoney', money);
            localStorage.setItem('lockOwned', JSON.stringify(owned));
            localStorage.setItem('lockActive', active);
        }

        function start() {
            isPlaying = true; level = 1; hits = 3; speed = 2.4; combo = 0; comboT = 0; angle = 0;
            document.body.style.background = "#121212";
            document.body.classList.remove('rainbow-active');
            track.classList.remove('neon-aura');
            closePanels();
            document.getElementById('ui-header').style.display = 'block';
            document.getElementById('game-box').style.display = 'block';
            document.getElementById('touch-layer').style.display = 'block';
            spawnTarget(); updateM();
            hitsEl.innerText = hits;
            comboEl.innerText = 'COMBO x0';
            levelEl.innerText = 'BÖLÜM ' + level;
        }

        function spawnTarget() {
            targetAngle = (angle + 100 + Math.random() * 140) % 360;
            targetDir = Math.random() > 0.5 ? 1 : -1;
            tCont.style.transform = `rotate(${targetAngle}deg)`;
        }

        function action() {
            if(!isPlaying) return;
            let pA = ((angle % 360) + 360) % 360;
            let tA = ((targetAngle % 360) + 360) % 360;
            let diff = Math.min(Math.abs(pA - tA), 360 - Math.abs(pA - tA));

            if(diff <= 35) {
                combo++; comboT = COMBO_MAX;
                if(combo % 5 === 0) {
                    const w = document.createElement('div'); w.className = 'word-float';
                    w.innerText = words[Math.min(Math.floor(combo/5)-1, words.length-1)];
                    w.style.top = "30%"; document.body.appendChild(w);
                    setTimeout(() => w.remove(), 600);
                }
                if(combo < 10 && combo % 3 === 0) document.body.style.backgroundColor = bgColors[Math.floor(Math.random()*bgColors.length)];
                if(combo === 10) { track.classList.add('neon-aura'); document.body.classList.add('rainbow-active'); }
                
                money += (level * 10 * combo); hits--;
                if(hits <= 0) { 
                    level++; 
                    levelEl.innerText = 'BÖLÜM ' + level;
                    hits = Math.min(level + 2, 10); 
                    speed += 0.2; 
                    targetSpeed += 0.08; 
                }
                dir *= -1; spawnTarget(); updateM();
                hitsEl.innerText = hits;
                comboEl.innerText = 'COMBO x' + combo;
            } else {
                isPlaying = false;
                document.getElementById('final-lvl').innerText = 'Bölüm: ' + level;
                document.getElementById('death').style.display = 'flex';
                document.getElementById('game-box').style.display = 'none';
            }
        }

        document.getElementById('touch-layer').addEventListener('mousedown', action);
        document.getElementById('touch-layer').addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive:false});

        function closePanels() { document.querySelectorAll('.panel').forEach(p => p.style.display = 'none'); if(!isPlaying) document.getElementById('menu').style.display='flex'; }
        
        function openMarket() { 
            const l = document.getElementById('market-list'); l.innerHTML = '';
            skins.forEach(s => {
                const div = document.createElement('div'); div.className = `list-item ${active === s.i ? 'active' : ''}`;
                div.innerHTML = `<span>${s.i} Skin</span> <span>${owned.includes(s.i) ? 'ALINDI' : s.p + ' 💰'}</span>`;
                div.onclick = () => { if(!owned.includes(s.i) && money >= s.p) { money -= s.p; owned.push(s.i); updateM(); openMarket(); } };
                l.appendChild(div);
            });
            document.getElementById('market-panel').style.display = 'flex'; 
        }

        function openInventory() { 
            const l = document.getElementById('inv-list'); l.innerHTML = '';
            owned.forEach(s => {
                const div = document.createElement('div'); div.className = `list-item ${active === s ? 'active' : ''}`;
                div.innerHTML = `<span>${s} Karakteri</span> <span>${active === s ? 'SEÇİLİ' : 'SEÇ'}</span>`;
                div.onclick = () => { active = s; updateM(); openInventory(); };
                l.appendChild(div);
            });
            document.getElementById('inv-panel').style.display = 'flex'; 
        }

        function loop() {
            if(isPlaying) {
                angle += speed * dir;
                pCont.style.transform = `rotate(${angle}deg)`;
                targetAngle += targetSpeed * targetDir;
                tCont.style.transform = `rotate(${targetAngle}deg)`;
                
                if(comboT > 0) { 
                    comboT -= 16; 
                    comboFill.style.transform = `scaleX(${comboT/COMBO_MAX})`; 
                } else if(combo > 0) { 
                    combo = 0; 
                    document.body.classList.remove('rainbow-active'); 
                    track.classList.remove('neon-aura'); 
                    document.body.style.background = "#121212"; 
                    comboEl.innerText = 'COMBO x0'; 
                }
            }
            requestAnimationFrame(loop);
        }
        updateM(); loop();
    </script>
</body>
</html>
